<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mono Tab</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="icons/icon128.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon128.svg" />
</head>
<body>
  <div id="themeToggleWrapper">
    <button id="themeToggleBtn" title="切换白天/黑夜模式">
      <svg id="themeIcon" width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="moonIcon" d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="#23242a"/>
        <g id="sunGroup" style="display:none;">
          <circle id="sunIcon" cx="14" cy="14" r="7" fill="#FFD600"/>
          <g id="sunRays" stroke="#FFD600" stroke-width="2" stroke-linecap="round">
            <line x1="14" y1="3" x2="14" y2="7"/>
            <line x1="14" y1="21" x2="14" y2="25"/>
            <line x1="3" y1="14" x2="7" y2="14"/>
            <line x1="21" y1="14" x2="25" y2="14"/>
            <line x1="6.22" y1="6.22" x2="9.05" y2="9.05"/>
            <line x1="18.95" y1="18.95" x2="21.78" y2="21.78"/>
            <line x1="6.22" y1="21.78" x2="9.05" y2="18.95"/>
            <line x1="18.95" y1="9.05" x2="21.78" y2="6.22"/>
          </g>
        </g>
      </svg>
    </button>
  </div>
  <div class="mono-header">
    <h1>Mono Tab</h1>
  </div>
  <div class="search-section">
    <div class="search-container">
      <div class="search-engine-indicator" id="searchEngineIndicator">
        <img id="searchEngineIcon" src="https://www.google.com/favicon.ico" alt="搜索引擎" />
      </div>
      <div id="searchEngineDropdown" class="search-engine-dropdown" style="display:none;"></div>
      <input type="text" id="searchInput" placeholder="搜索或输入网址..." />
      <button id="searchBtn" title="搜索">🔍</button>
    </div>
  </div>
  <div class="glass">
    <div id="dial-container" class="dial-grid"></div>
  </div>
  <button id="settingsBtn" title="设置">⚙️</button>
  
  <!-- 设置模态框 -->
  <div id="settingsModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>设置</h2>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <div class="setting-section">
          <h3>添加网站</h3>
          <div class="input-group">
            <input type="text" id="modalUrlInput" placeholder="https://example.com 或 example.com" />
            <input type="text" id="modalNameInput" placeholder="网站名称（可选）" />
            <button id="modalAddBtn">添加</button>
          </div>
          <div class="icon-upload-section">
            <div class="icon-option-tabs">
              <button class="icon-tab active" data-tab="upload">📁 上传图标</button>
              <button class="icon-tab" data-tab="url">🔗 图标URL</button>
            </div>
            <div class="icon-upload-content" id="uploadTab">
              <label for="iconUpload" class="icon-upload-label">
                <span>选择图标文件</span>
                <input type="file" id="iconUpload" accept="image/*" style="display: none;" />
              </label>
            </div>
            <div class="icon-url-content" id="urlTab" style="display: none;">
              <div class="input-group">
                <input type="url" id="iconUrlInput" placeholder="https://example.com/icon.png" />
                <button id="loadIconUrl">加载</button>
              </div>
            </div>
            <div id="iconPreview" class="icon-preview" style="display: none;">
              <img id="previewImage" alt="预览" />
              <button id="removeIcon" class="remove-icon-btn">×</button>
            </div>
          </div>
        </div>
        <div class="setting-section">
          <h3>显示设置</h3>
          <div class="setting-item">
            <label for="showDomainToggle">显示网站名称</label>
            <input type="checkbox" id="showDomainToggle" checked />
          </div>
        </div>
        <div class="setting-section">
          <h3>搜索引擎设置</h3>
          <div class="setting-item">
            <label for="searchEngineSelect">默认搜索引擎</label>
            <select id="searchEngineSelect">
              <option value="google">Google</option>
              <option value="bing">Bing</option>
              <option value="baidu">百度</option>
              <!-- <option value="duckduckgo">DuckDuckGo</option> -->
              <option value="yandex">Yandex</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="src/main.js"></script>
</body>
</html>
